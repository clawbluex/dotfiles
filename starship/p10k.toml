"$schema" = 'https://starship.rs/config-schema.json'
add_newline=false

format = """
[ $os ](bg:#a3aed2 fg:#090c0c)\
[\ue0b4](bg:#769ff0 fg:#a3aed2)\
$directory\
[\ue0b4](fg:#769ff0 bg:#394260)\
$fill\
$hostname\
$nodejs\
$rust\
$golang\
$php\
$time\
[\ue0b4](fg:#1d2230)\
\n$character"""

right_format = """
$git_branch\
$git_status\
"""

[fill]
disabled = false
symbol = '-'

[hostname]
ssh_only = true
format = "[\ue0b6](fg:#a3aed2)[$hostname](bg:#a3aed2 fg:#090c0c)"

[os]
disabled = false
style = "bg:red fg:crust"

