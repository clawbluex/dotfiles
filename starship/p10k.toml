[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[$read_only]($style)[ $path ]($style)"
truncation_length = 3
truncation_symbol = "\u2026"

[git_branch]
symbol = "´Éÿ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[nodejs]
